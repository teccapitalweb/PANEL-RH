<html lang="es">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <style>
/* =====================================================================
   styles.css — Evaluación de Ingreso (kiosko)
   Minimalismo quirúrgico, un acento, escala kiosko (toques grandes).
   ===================================================================== */
:root {
  --bg: #F4F3EF;
  --bg-grad: radial-gradient(1200px 700px at 75% -10%, rgba(75,79,230,.07), transparent 60%);
  --surface: #FFFFFF;
  --surface-2: #FAF9F6;
  --glass: rgba(255,255,255,.72);
  --border: rgba(18,20,40,.10);
  --border-2: rgba(18,20,40,.06);
  --text: #14152A;
  --muted: #6B6D82;
  --faint: #9A9CB0;
  --accent: #4B4FE6;
  --accent-2: #6E73FF;
  --accent-soft: rgba(75,79,230,.10);
  --good: #1F9D6B;
  --warn: #C8841A;
  --bad: #D64550;
  --glow: none;
  --ring: 0 0 0 3px rgba(75,79,230,.18);
  --shadow: 0 1px 2px rgba(18,20,40,.04), 0 10px 30px rgba(18,20,40,.07);
  --shadow-lg: 0 30px 70px rgba(18,20,40,.18);
  --r-sm: 9px; --r-md: 13px; --r-lg: 18px; --r-xl: 28px;
  --font-display: "Space Grotesk", system-ui, sans-serif;
  --font-body: "DM Sans", system-ui, sans-serif;
}
[data-theme="dark"] {
  --bg: #080B16;
  --bg-grad: radial-gradient(1100px 620px at 80% -12%, rgba(110,115,255,.18), transparent 62%);
  --surface: #0F1424;
  --surface-2: #131A2E;
  --glass: rgba(16,22,42,.62);
  --border: rgba(120,140,255,.15);
  --border-2: rgba(120,140,255,.08);
  --text: #EAECF7;
  --muted: #8B90B2;
  --faint: #5C6184;
  --accent: #6E73FF;
  --accent-2: #8C90FF;
  --accent-soft: rgba(110,115,255,.16);
  --good: #34D399;
  --warn: #FBBF49;
  --bad: #FB7185;
  --glow: 0 0 30px rgba(110,115,255,.40);
  --ring: 0 0 0 3px rgba(110,115,255,.28);
  --shadow: 0 1px 2px rgba(0,0,0,.4), 0 12px 34px rgba(0,0,0,.45);
  --shadow-lg: 0 34px 80px rgba(0,0,0,.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: var(--font-body); color: var(--text);
  background: var(--bg); background-image: var(--bg-grad); background-attachment: fixed;
  -webkit-font-smoothing: antialiased; line-height: 1.5;
}
h1, h2, h3 { font-family: var(--font-display); font-weight: 600; letter-spacing: -.02em; }
button { font-family: inherit; cursor: pointer; }
* { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
*::-webkit-scrollbar { width: 8px; height: 8px; }
*::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

/* ---------- Layout kiosko ---------- */
.kiosk { min-height: 100vh; display: flex; flex-direction: column; }
.topbar {
  display: flex; align-items: center; justify-content: space-between; gap: 14px;
  padding: 14px 22px; background: var(--glass); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.brand { display: flex; align-items: center; gap: 10px; font-family: var(--font-display); font-weight: 700; font-size: 1.02rem; }
.brand .mark { width: 32px; height: 32px; border-radius: 10px; display: grid; place-items: center; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: var(--glow); }
.brand .mark svg { width: 17px; height: 17px; }
.icon-btn { width: 40px; height: 40px; display: grid; place-items: center; border-radius: var(--r-md); border: 1px solid var(--border); background: var(--surface); color: var(--muted); transition: all .16s; }
.icon-btn:hover { color: var(--text); border-color: var(--accent); }
.icon-btn svg { width: 18px; height: 18px; }

.kprogress { display: flex; align-items: center; gap: 12px; padding: 12px 22px 0; max-width: 680px; margin: 0 auto; width: 100%; visibility: hidden; }
.kbar { flex: 1; height: 7px; background: var(--surface-2); border: 1px solid var(--border-2); border-radius: 99px; overflow: hidden; }
.kbar__fill { height: 100%; width: 0; border-radius: 99px; background: linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width .4s ease; }
#kstep { font-size: .76rem; font-weight: 600; color: var(--muted); white-space: nowrap; }

#stage { flex: 1; display: flex; }
.screen { width: 100%; max-width: 680px; margin: 0 auto; padding: 26px 22px 40px; display: flex; flex-direction: column; animation: subir .34s ease; }
.screen--center { justify-content: center; align-items: center; text-align: center; }
@keyframes subir { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: none; } }

/* ---------- Botones ---------- */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 13px 20px; border-radius: var(--r-md); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: .95rem; font-weight: 600; transition: transform .15s ease, box-shadow .15s ease, border-color .15s; }
.btn:hover { border-color: var(--accent); transform: translateY(-2px); }
.btn:active { transform: translateY(0); }
.btn--primary { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: var(--glow); }
.btn--primary:hover { background: var(--accent-2); border-color: var(--accent-2); box-shadow: 0 10px 28px rgba(75,79,230,.28); }
.btn--ghost { background: transparent; }
.btn--lg { padding: 15px 26px; font-size: 1rem; }
.btn--xl { padding: 17px 40px; font-size: 1.1rem; border-radius: var(--r-lg); margin-top: 8px; }

/* ---------- Bienvenida / pantallas centradas ---------- */
.welcome { max-width: 460px; display: flex; flex-direction: column; align-items: center; }
.welcome__mark { width: 76px; height: 76px; border-radius: 22px; display: grid; place-items: center; background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #fff; box-shadow: var(--glow); margin-bottom: 22px; }
.welcome__mark--soft { background: var(--accent-soft); color: var(--accent); box-shadow: none; }
.welcome__mark svg { width: 38px; height: 38px; }
.welcome__title { font-size: clamp(1.7rem, 5vw, 2.4rem); line-height: 1.05; margin-bottom: 12px; }
.welcome__sub { color: var(--muted); font-size: 1.02rem; line-height: 1.6; margin-bottom: 26px; }
.welcome__foot { margin-top: 26px; font-size: .8rem; color: var(--faint); letter-spacing: .03em; }
.tips { list-style: none; text-align: left; margin-bottom: 26px; display: flex; flex-direction: column; gap: 12px; }
.tips li { position: relative; padding-left: 30px; color: var(--muted); font-size: .96rem; }
.tips li::before { content: ""; position: absolute; left: 0; top: 6px; width: 18px; height: 18px; border-radius: 50%; background: var(--accent-soft); }
.tips li::after { content: ""; position: absolute; left: 6px; top: 10px; width: 6px; height: 6px; border-radius: 50%; background: var(--accent); }

/* ---------- Captura de datos ---------- */
.k-head { margin-bottom: 20px; }
.k-head h2 { font-size: 1.5rem; margin-bottom: 4px; }
.k-head p { color: var(--muted); font-size: .92rem; }
.form { display: flex; flex-direction: column; gap: 16px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media (max-width: 520px) { .form-grid { grid-template-columns: 1fr; } }
.field { display: flex; flex-direction: column; gap: 7px; }
.field__label { font-size: .82rem; font-weight: 600; color: var(--muted); }
.input { width: 100%; padding: 14px 15px; border-radius: var(--r-md); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-family: inherit; font-size: 1rem; transition: border-color .16s, box-shadow .16s; }
.input:focus { outline: none; border-color: var(--accent); box-shadow: var(--ring); }
.input::placeholder { color: var(--faint); }
.form-error { color: var(--bad); font-size: .85rem; min-height: 1em; }
.choices { display: flex; flex-wrap: wrap; gap: 9px; }
.choice { padding: 11px 16px; border-radius: 99px; border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: .92rem; font-weight: 500; transition: all .15s; }
.choice:hover { border-color: var(--accent); }
.choice.is-sel { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: var(--glow); }

.k-actions { display: flex; align-items: center; justify-content: space-between; gap: 14px; margin-top: 26px; }
.q-hint { font-size: .82rem; color: var(--faint); }

/* ---------- Pregunta ---------- */
.q-tag { display: inline-block; align-self: flex-start; padding: 5px 13px; border-radius: 99px; font-size: .76rem; font-weight: 600; background: var(--accent-soft); color: var(--accent); margin-bottom: 18px; }
.q-text { font-family: var(--font-display); font-size: clamp(1.35rem, 4vw, 1.85rem); line-height: 1.25; font-weight: 600; margin-bottom: 28px; }
.optgrid { display: flex; flex-direction: column; gap: 12px; }
.opt { display: flex; align-items: center; gap: 15px; text-align: left; padding: 18px 20px; border-radius: var(--r-lg); border: 1.5px solid var(--border); background: var(--surface); color: var(--text); font-size: 1.05rem; font-weight: 500; box-shadow: var(--shadow); transition: transform .14s ease, border-color .14s, background .14s; }
.opt:hover { border-color: var(--accent); transform: translateY(-2px); }
.opt:active { transform: translateY(0); }
.opt__dot { width: 22px; height: 22px; flex: none; border-radius: 50%; border: 2px solid var(--faint); transition: all .14s; position: relative; }
.opt.is-sel { border-color: var(--accent); background: var(--accent-soft); }
.opt.is-sel .opt__dot { border-color: var(--accent); background: var(--accent); box-shadow: inset 0 0 0 4px var(--surface); }
.opt__t { flex: 1; }

/* ---------- Reacción ---------- */
.rx-wrap { display: flex; flex-direction: column; align-items: center; gap: 22px; }
.rx-prog { font-size: .82rem; font-weight: 600; color: var(--muted); }
.rx-target { width: min(72vw, 260px); height: min(72vw, 260px); border-radius: 50%; border: none; font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: #fff; transition: transform .1s, background .12s; user-select: none; }
.rx-target:active { transform: scale(.97); }
.rx-state-wait { background: #6B6D82; color: #fff; }
.rx-state-go { background: var(--good); box-shadow: 0 0 0 10px color-mix(in srgb, var(--good) 22%, transparent), 0 0 50px color-mix(in srgb, var(--good) 55%, transparent); }
.rx-state-early { background: var(--bad); }
.rx-state-done { background: var(--accent); }
.rx-hint { font-size: .95rem; color: var(--muted); min-height: 1.2em; }

/* ---------- Fin (popup) ---------- */
.welcome--done .done-check { width: 84px; height: 84px; border-radius: 50%; display: grid; place-items: center; background: color-mix(in srgb, var(--good) 14%, transparent); color: var(--good); margin-bottom: 22px; animation: pop .4s ease; }
.welcome--done .done-check svg { width: 42px; height: 42px; }
@keyframes pop { 0% { transform: scale(.6); opacity: 0; } 60% { transform: scale(1.08); } 100% { transform: scale(1); opacity: 1; } }

.modal-overlay { position: fixed; inset: 0; z-index: 100; display: grid; place-items: center; padding: 22px; background: rgba(8,11,22,.55); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); opacity: 0; transition: opacity .22s; }
.modal-overlay.is-on { opacity: 1; }
.modal { width: 100%; max-width: 420px; text-align: center; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r-xl); box-shadow: var(--shadow-lg); padding: 34px 30px; transform: translateY(14px) scale(.97); transition: transform .22s; }
.modal-overlay.is-on .modal { transform: translateY(0) scale(1); }
.modal__icon { width: 60px; height: 60px; margin: 0 auto 18px; border-radius: 50%; display: grid; place-items: center; background: color-mix(in srgb, var(--good) 14%, transparent); color: var(--good); }
.modal__icon svg { width: 30px; height: 30px; }
.modal h3 { font-size: 1.3rem; margin-bottom: 10px; }
.modal p { color: var(--muted); font-size: .96rem; line-height: 1.6; margin-bottom: 24px; }

/* ---------- Date picker ---------- */
.datepick { position: relative; }
.datepick__btn { width: 100%; display: flex; align-items: center; gap: 10px; padding: 14px 15px; border-radius: var(--r-md); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 1rem; transition: border-color .16s, box-shadow .16s; }
.datepick__btn svg { width: 17px; height: 17px; color: var(--muted); }
.datepick.is-open .datepick__btn { border-color: var(--accent); box-shadow: var(--ring); }
.datepick__pop { position: absolute; top: calc(100% + 6px); left: 0; z-index: 45; width: 280px; background: var(--glass); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); padding: 12px; opacity: 0; transform: translateY(-6px); pointer-events: none; transition: all .16s; }
.datepick.is-open .datepick__pop { opacity: 1; transform: translateY(0); pointer-events: auto; }
.dp-nav { display: flex; align-items: center; justify-content: space-between; gap: 4px; margin-bottom: 8px; }
.dp-month { font-family: var(--font-display); font-weight: 600; font-size: .88rem; flex: 1; text-align: center; }
.dp-arrow { width: 30px; height: 30px; display: grid; place-items: center; border-radius: var(--r-sm); border: 1px solid var(--border); background: var(--surface); color: var(--muted); }
.dp-arrow:hover { color: var(--accent); border-color: var(--accent); }
.dp-arrow svg { width: 14px; height: 14px; }
.dp-dows { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; margin-bottom: 4px; }
.dp-dows span { text-align: center; font-size: .68rem; font-weight: 600; color: var(--faint); padding: 3px 0; }
.dp-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
.dp-cell { aspect-ratio: 1; display: grid; place-items: center; border-radius: var(--r-sm); border: none; background: transparent; color: var(--text); font-size: .82rem; transition: background .12s; }
.dp-cell:not(.dp-empty):hover { background: var(--accent-soft); }
.dp-cell.is-sel { background: var(--accent); color: #fff; font-weight: 600; }
.dp-empty { pointer-events: none; }

/* ---------- Porqué de la respuesta ---------- */
.porque { margin-top: 22px; animation: subir .25s ease; }
.porque__label { display: block; font-size: .95rem; font-weight: 600; color: var(--text); margin-bottom: 9px; }
.porque__ta { resize: vertical; min-height: 90px; line-height: 1.5; }

/* ---------- Preguntas abiertas (entrevista) ---------- */
.q-tag--open { background: color-mix(in srgb, var(--good) 14%, transparent); color: var(--good); }
.abierta-ta { resize: vertical; min-height: 150px; line-height: 1.55; }
.abierta-hint { font-size: .85rem; color: var(--muted); margin-top: 10px; }

</style>
</head>

  <script>
/* =====================================================================
   firebase-config.js — Evaluación de Ingreso
   ---------------------------------------------------------------------
   El kiosko del aspirante y el panel privado de RH comparten el MISMO
   proyecto de Firebase. El aspirante (sin login) solo crea su registro
   en la colección "aspirantes"; RH (con login) lo lee y califica.
   ===================================================================== */
const firebaseConfig = {
  apiKey: "TODO",
  authDomain: "TODO.firebaseapp.com",
  projectId: "TODO",
  storageBucket: "TODO.appspot.com",
  messagingSenderId: "TODO",
  appId: "TODO",
};
/* Reglas sugeridas:
   - aspirantes: create público (el kiosko escribe), read/update solo RH autenticado.
   - El texto del popup final vive en config/evaluacion (editable por RH). */

/* =====================================================================
   data.js — Evaluación de Ingreso (kiosko del aspirante)
   ---------------------------------------------------------------------
   Banco de preguntas con metadata de calificación. Cada opción lleva un
   valor de favorabilidad (v: 0 a 3, más alto = mejor). El panel de RH
   usará esta misma metadata para calificar y comparar fortalezas/áreas
   débiles por dimensión. En producción se guarda en Firestore.
   ===================================================================== */

/* Texto del popup final — EDITABLE por RH desde su panel */
const CONFIG = {
  titulo: "Evaluación de ingreso",
  empresa: "TEC CAPITAL",
  mensajeFinTitulo: "¡Listo! Concluiste tu evaluación",
  mensajeFinCuerpo: "Gracias por tu tiempo. El área de Recursos Humanos revisará tus respuestas y te contactará en un plazo de 2 a 3 días hábiles.",
};

/* Catálogos para la captura de datos (estilo botón, mínimo tecleo) */
const PUESTOS = ["Atención a cliente", "Cajero(a)", "Ventas", "Almacén", "Administrativo", "Cocina / Producción"];
const ESCOLARIDAD = ["Secundaria", "Preparatoria", "Técnico", "Licenciatura", "Posgrado"];
const GENEROS = ["Masculino", "Femenino", "Otro"];

/* Dimensiones evaluadas (en el orden del examen) */
const DIMENSIONES = {
  perfil: "Sobre ti",
  personalidad: "Personalidad laboral",
  social: "Habilidades sociales",
  intelecto: "Intelecto y razonamiento",
  juicio: "Juicio situacional",
  servicio: "Orientación al servicio",
  estres: "Tolerancia al estrés",
  psicosocial: "Bienestar psicosocial",
  honestidad: "Honestidad e integridad",
  logistica: "Disponibilidad",
  atencion: "Atención y reacción",
};

/* Opciones Likert reutilizables (favorabilidad ya codificada) */
const L = [
  { t: "Totalmente de acuerdo", v: 3 },
  { t: "De acuerdo", v: 2 },
  { t: "En desacuerdo", v: 1 },
  { t: "Totalmente en desacuerdo", v: 0 },
];

/* Banco de preguntas EN ORDEN (la dimensión "atencion" se mide con una tarea aparte).
   Las marcadas con info:true son solo de perfil: se capturan (opción + porqué) pero NO califican. */
const PREGUNTAS = [
  // 1) Sobre ti — calentamiento
  { id: "pf0", dim: "perfil", info: true, texto: "¿Cómo te enteraste de esta vacante?", opciones: [
    { t: "Bolsa de trabajo o internet", v: 2 }, { t: "Redes sociales", v: 2 }, { t: "Me la recomendaron", v: 2 }, { t: "Pasé por el lugar", v: 2 }, { t: "Ya conocía la empresa", v: 2 }, { t: "Otro medio", v: 2 },
  ]},
  { id: "pf1", dim: "perfil", info: true, texto: "¿Qué tipo de actividades disfrutas más?", opciones: [
    { t: "Trabajar en equipo", v: 2 }, { t: "Resolver problemas", v: 2 }, { t: "Atender y ayudar a personas", v: 2 }, { t: "Tareas prácticas o manuales", v: 2 }, { t: "Organizar y planear", v: 2 },
  ]},
  { id: "pf2", dim: "perfil", info: true, texto: "¿Qué te apasiona o disfrutas fuera del trabajo?", opciones: [
    { t: "El deporte", v: 2 }, { t: "La familia", v: 2 }, { t: "Aprender cosas nuevas", v: 2 }, { t: "El arte o la música", v: 2 }, { t: "Los negocios", v: 2 },
  ]},
  { id: "pf3", dim: "perfil", texto: "¿Qué es lo más importante para ti en un trabajo?", opciones: [
    { t: "Crecer y aprender", v: 3 }, { t: "Un buen ambiente y equipo", v: 3 }, { t: "Estabilidad y seguridad", v: 2 }, { t: "Principalmente el sueldo", v: 1 },
  ]},
  { id: "pf4", dim: "perfil", texto: "¿Por qué te interesa este puesto?", opciones: [
    { t: "Quiero desarrollarme aquí", v: 3 }, { t: "Me gusta este giro o trabajo", v: 3 }, { t: "Necesito ingresos ahora", v: 2 }, { t: "Me queda cerca de casa", v: 1 },
  ]},
  { id: "pf5", dim: "perfil", texto: "¿Cómo te describirías?", opciones: [
    { t: "Siempre busco mejorar", v: 3 }, { t: "Cumplo bien con lo que me piden", v: 2 }, { t: "Hago lo necesario para salir del paso", v: 1 },
  ]},
  { id: "pf6", dim: "perfil", info: true, porqueLabel: "Cuéntanos un ejemplo de cómo la usas.", texto: "¿Cuál dirías que es tu mayor fortaleza?", opciones: [
    { t: "Responsabilidad", v: 2 }, { t: "Trabajo en equipo", v: 2 }, { t: "Aprendo rápido", v: 2 }, { t: "Trato con la gente", v: 2 }, { t: "Organización", v: 2 }, { t: "Resolver problemas", v: 2 },

const $ = (s, r = document) => r.querySelector(s);
const $$ = (s, r = document) => [...r.querySelectorAll(s)];
const MESES = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
const fechaLarga = iso => { if (!iso) return ""; const [y, m, d] = iso.split("-").map(Number); return `${d} ${MESES[m - 1]} ${y}`; };
const esEmail = v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
const soloDigitos = v => v.replace(/\D/g, "");

/* ---------- Date picker (nacimiento) ---------- */
const DIAS = ["L", "M", "M", "J", "V", "S", "D"];
const MESES_LARGO = ["Enero", "Febrero", "Marzo", "Abril", "Mayo", "Junio", "Julio", "Agosto", "Septiembre", "Octubre", "Noviembre", "Diciembre"];
function datepickHTML(name, value, openDef) {
  return `<div class="datepick" data-name="${name}" data-value="${value || ""}" data-open="${openDef || ""}">
    <button type="button" class="datepick__btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
      <span class="datepick__val">${value ? fechaLarga(value) : "Seleccionar"}</span></button>
    <div class="datepick__pop"></div></div>`;
}
function renderCalendar(dp, vy, vm) {
  const startDow = (new Date(vy, vm, 1).getDay() + 6) % 7;
  const dim = new Date(vy, vm + 1, 0).getDate();
  const sel = dp.dataset.value;
  let cells = "";
  for (let i = 0; i < startDow; i++) cells += `<span class="dp-cell dp-empty"></span>`;
  for (let d = 1; d <= dim; d++) {
    const iso = `${vy}-${String(vm + 1).padStart(2, "0")}-${String(d).padStart(2, "0")}`;
    cells += `<button type="button" class="dp-cell ${iso === sel ? "is-sel" : ""}" data-iso="${iso}">${d}</button>`;
  }
  const pop = $(".datepick__pop", dp);
  pop.innerHTML = `<div class="dp-nav">
      <button type="button" class="dp-arrow" data-nav="-12" title="Año anterior"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m11 17-5-5 5-5M18 17l-5-5 5-5"/></svg></button>
      <button type="button" class="dp-arrow" data-nav="-1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <span class="dp-month">${MESES_LARGO[vm]} ${vy}</span>
      <button type="button" class="dp-arrow" data-nav="1"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
      <button type="button" class="dp-arrow" data-nav="12" title="Año siguiente"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m13 17 5-5-5-5M6 17l5-5-5-5"/></svg></button>
    </div>
    <div class="dp-dows">${DIAS.map(d => `<span>${d}</span>`).join("")}</div>
    <div class="dp-grid">${cells}</div>`;
  dp._vy = vy; dp._vm = vm;
  $$(".dp-arrow", pop).forEach(a => a.addEventListener("click", e => {
    e.stopPropagation();
    let total = dp._vy * 12 + dp._vm + Number(a.dataset.nav);
    renderCalendar(dp, Math.floor(total / 12), ((total % 12) + 12) % 12);
  }));
  $$(".dp-cell[data-iso]", pop).forEach(c => c.addEventListener("click", () => {
    dp.dataset.value = c.dataset.iso;
    $(".datepick__val", dp).textContent = fechaLarga(c.dataset.iso);
    dp.classList.remove("is-open");
  }));
}
function bindDatepick(root) {
  $$(".datepick", root).forEach(dp => {
    $(".datepick__btn", dp).addEventListener("click", e => {
      e.stopPropagation();
      $$(".datepick").forEach(x => { if (x !== dp) x.classList.remove("is-open"); });
      if (dp.classList.toggle("is-open")) {
        const base = dp.dataset.value || dp.dataset.open || "2000-01";
        const p = base.split("-").map(Number);
        renderCalendar(dp, p[0], (p[1] || 1) - 1);
      }
    });
  });
}

}

  if (lab) lab.textContent = txt || "";
  $("#kprogress").style.visibility = pct > 0 && pct < 1 ? "visible" : "hidden";
}

    avanzarPregunta();
  });
  $("#qBack").addEventListener("click", () => {
    if (state.qIdx === 0) { state.fase = "instrucciones"; render(); }
    else { state.qIdx--; render(); }
  });
}
function avanzarPregunta() {
  if (state.qIdx < PREGUNTAS.length - 1) { state.qIdx++; render(); }
  else { state.fase = "reaccion"; render(); }
}

/* ---------- Prueba de atención / reacción ---------- */
const RX = {
  rondas: 5, hechas: 0, tiempos: [], esperando: false, verdeEn: 0, _t: null, fase: "intro",
  intro() {
    setProgreso(0.95, "Atención y reacción");
    $("#stage").innerHTML = `
      <div class="screen screen--center">
        <div class="welcome">
          <div class="welcome__mark welcome__mark--soft"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9z"/></svg></div>
          <h1 class="welcome__title">Prueba de reacción</h1>
          <p class="welcome__sub">Verás un círculo gris. <strong>En cuanto se ponga verde, tócalo lo más rápido que puedas.</strong> Son ${this.rondas} rondas. No toques antes del verde.</p>
          <button class="btn btn--xl btn--primary" id="rxStart">Empezar prueba</button>
        </div>
      </div>`;
    $("#rxStart").addEventListener("click", () => this.start());
  },
  start() { this.hechas = 0; this.tiempos = []; this.pantalla(); this.siguiente(); },
  pantalla() {
    $("#stage").innerHTML = `
      <div class="screen screen--center">
        <div class="rx-wrap">
          <div class="rx-prog" id="rxProg">Ronda 1 de ${this.rondas}</div>
          <button type="button" class="rx-target rx-state-wait" id="rxTarget">Espera…</button>
          <div class="rx-hint" id="rxHint">Prepárate…</div>
        </div>
      </div>`;
    $("#rxTarget").addEventListener("click", () => this.tap());
  },
  siguiente() {
    if (this.hechas >= this.rondas) return this.fin();
    const t = $("#rxTarget"); if (!t) return;
    t.className = "rx-target rx-state-wait"; t.textContent = "Espera…";
    $("#rxHint").textContent = "Prepárate…";
    $("#rxProg").textContent = `Ronda ${this.hechas + 1} de ${this.rondas}`;
    this.esperando = false;
    clearTimeout(this._t);
    this._t = setTimeout(() => this.verde(), 900 + Math.random() * 1900);
  },
  verde() {
    const t = $("#rxTarget"); if (!t) return;
    t.className = "rx-target rx-state-go"; t.textContent = "¡TOCA!";
    $("#rxHint").textContent = "";
    this.esperando = true; this.verdeEn = Date.now();
  },
  tap() {
    const t = $("#rxTarget"); if (!t) return;
    if (!this.esperando) {
      clearTimeout(this._t);
      t.className = "rx-target rx-state-early"; t.textContent = "Muy pronto";
      $("#rxHint").textContent = "Espera a que se ponga verde";
      setTimeout(() => this.siguiente(), 800);
      return;
    }
    const ms = Date.now() - this.verdeEn;
    this.tiempos.push(ms); this.hechas++; this.esperando = false;
    t.className = "rx-target rx-state-done"; t.textContent = ms + " ms";
    $("#rxHint").textContent = "¡Bien!";
    if (this.hechas >= this.rondas) setTimeout(() => this.fin(), 700);
    else setTimeout(() => this.siguiente(), 700);
  },
  fin() {
    const avg = this.tiempos.length ? Math.round(this.tiempos.reduce((a, b) => a + b, 0) / this.tiempos.length) : 0;
    const score = avg && avg < 320 ? 3 : avg < 460 ? 2 : avg < 650 ? 1 : 0;
    state.atencion = { avgMs: avg, score, intentos: this.tiempos.slice() };
    state.fase = "fin"; render();
  },
};
function renderReaccion() { RX.intro(); }

/* ---------- Cálculo del resultado (lo usa el panel de RH) ---------- */
function calcularResultado(resp, aten) {
  const dims = {};
  Object.keys(DIMENSIONES).forEach(d => { if (d !== "atencion") dims[d] = { sum: 0, max: 0 }; });
  Object.values(resp).forEach(r => { if (dims[r.dim] && !r.info) { dims[r.dim].sum += r.v; dims[r.dim].max += 3; } });
  const porDim = {};
  Object.keys(dims).forEach(d => {
    const pct = dims[d].max ? dims[d].sum / dims[d].max : 0;
    porDim[d] = { pct, nivel: nivelDim(pct) };
  });
  if (aten) porDim.atencion = { pct: aten.score / 3, nivel: nivelDim(aten.score / 3), avgMs: aten.avgMs };
  const vals = Object.values(porDim).map(x => x.pct);
  const global = vals.length ? vals.reduce((a, b) => a + b, 0) / vals.length : 0;
  const aciertos = Object.values(resp).filter(r => r.dim === "intelecto" && r.correcta).length;
  const banderas = CRITICAS.filter(d => porDim[d] && porDim[d].pct < 0.45);
  return { porDim, global, aciertosIntelecto: aciertos, banderas };
}
function nivelDim(pct) { return (NIVEL_DIM.find(n => pct >= n.min) || NIVEL_DIM[NIVEL_DIM.length - 1]).label; }

function guardarAspirante() {
  const resultado = calcularResultado(state.respuestas, state.atencion);
  const registro = { id: "asp" + Date.now(), fecha: new Date().toISOString(), datos: state.datos, respuestas: state.respuestas, atencion: state.atencion, resultado };
  try {
    const k = "examenrh_aspirantes";
    const arr = JSON.parse(localStorage.getItem(k) || "[]");
    arr.push(registro); localStorage.setItem(k, JSON.stringify(arr));
  } catch (e) {}
  // TODO firebase: addDoc(collection(db,"aspirantes"), registro) → aparece en el panel de RH
  return registro;
}

function renderFin() {
  setProgreso(1, "");
  guardarAspirante();
  $("#stage").innerHTML = `
    <div class="screen screen--center">
      <div class="welcome welcome--done">
        <div class="done-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg></div>
        <h1 class="welcome__title">${CONFIG.mensajeFinTitulo}</h1>
        <p class="welcome__sub">${CONFIG.mensajeFinCuerpo}</p>
      </div>
    </div>`;
  // Popup de confirmación
  const ov = document.createElement("div");
  ov.className = "modal-overlay";
  ov.innerHTML = `
    <div class="modal" role="dialog" aria-modal="true">
      <div class="modal__icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/></svg></div>
      <h3>${CONFIG.mensajeFinTitulo}</h3>
      <p>${CONFIG.mensajeFinCuerpo}</p>
      <button class="btn btn--primary btn--lg" id="finOk">Entendido</button>
    </div>`;
  document.body.appendChild(ov);
  requestAnimationFrame(() => ov.classList.add("is-on"));
  $("#finOk", ov).addEventListener("click", () => {
    ov.classList.remove("is-on"); setTimeout(() => ov.remove(), 220);
    state.fase = "bienvenida"; state.qIdx = 0; state.datos = {}; state.respuestas = {}; state.atencion = null;
    render();
  });
}

/* ---------- Tema ---------- */
function applyTheme(t) {
  document.documentElement.setAttribute("data-theme", t);
  $("#iconMoon").style.display = t === "dark" ? "none" : "block";
  $("#iconSun").style.display = t === "dark" ? "block" : "none";
  try { localStorage.setItem("examenrh-theme", t); } catch (e) {}
}

document.addEventListener("DOMContentLoaded", () => {
  try { applyTheme(localStorage.getItem("examenrh-theme") || "light"); } catch (e) { applyTheme("light"); }
  $("#themeBtn").addEventListener("click", () => applyTheme(document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark"));
  document.addEventListener("click", () => $$(".datepick").forEach(d => d.classList.remove("is-open")));
  render();
});

  </script>
